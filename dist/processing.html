<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>코레일 - 처리중입니다</title>
  <style>
    :root {
      --common-color: #078eb9;
      --dark-blue: #0054a6;
      --bg-gray: #f1f3f6;
      --text-color: #333;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background-color: var(--bg-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    .processing-container {
      background-color: #ffffff;
      padding: 50px 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      text-align: center;
      width: 100%;
      max-width: 500px;
    }
    .logo-area {
      margin-bottom: 30px;
    }
    .logo-text {
      font-size: 26px;
      font-weight: bold;
      color: var(--dark-blue);
      letter-spacing: -1px;
    }
    .logo-text span {
      color: var(--common-color);
    }
    .status-msg {
      font-size: 22px;
      font-weight: bold;
      color: #111;
      margin-bottom: 12px;
    }
    .sub-msg {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 40px;
      word-break: keep-all;
    }
    
    /* 기차 레일 & 이동 애니메이션 로더 */
    .rail-loader {
      position: relative;
      width: 80%;
      height: 4px;
      background-color: #ccc;
      margin: 0 auto 20px auto;
      border-radius: 2px;
      overflow: hidden;
    }
    .train-pointer {
      position: absolute;
      top: 0;
      left: -20%;
      width: 20%;
      height: 100%;
      background: linear-gradient(90deg, transparent, var(--dark-blue), var(--common-color));
      border-radius: 2px;
      animation: trainMove 1.8s infinite linear;
    }
    
    @keyframes trainMove {
      0% { left: -20%; }
      100% { left: 100%; }
    }

    .info-footer {
      font-size: 12px;
      color: #aaa;
      border-top: 1px dashed #ddd;
      padding-top: 15px;
    }
  </style>
</head>
<body>

  <div class="processing-container">
    <div class="logo-area">
      <div class="logo-text">KORAIL <span>승차권예매</span></div>
    </div>
    
    <div class="status-msg">요청을 처리 중입니다.</div>
    <p class="sub-msg">
      현재 서비스 이용자가 많거나 시스템 전환 작업 중입니다.<br />
      안전하고 신속한 코레일 서비스를 위해 잠시만 기다려 주시면 고맙겠습니다.
    </p>
    
    <div class="rail-loader">
      <div class="train-pointer"></div>
    </div>
    
    <div class="info-footer">
      잠시 후 자동으로 페이지가 이동하지 않으면 새로고침(F5)을 시도해 주세요.
    </div>
  </div>

</body>
</html>
