version: 0.2

# ==============================================================================
# Frontend Deploy buildspec.yml
# ==============================================================================
# 이 파일은 두 가지 위치에서 사용됩니다:
#   1. 레포 루트 → GitHub Actions가 패키징 시 포함
#   2. CodeBuild 실행 환경 루트 → CodePipeline이 ZIP 해제 후 자동 탐색
#
# 환경변수 (CodeBuild 프로젝트에서 자동 주입):
#   FRONTEND_BUCKET            - 프론트엔드 S3 버킷 이름 (예: team-train-frontend)
#   CLOUDFRONT_DISTRIBUTION_ID - CloudFront 배포 ID
# ==============================================================================

phases:
  pre_build:
    commands:
      - echo "========================================"
      - echo " Frontend Deploy Start"
      - echo " $(date -u '+%Y-%m-%dT%H:%M:%SZ')"
      - 'echo "========================================"'
      - 'echo "Target S3 Bucket      : s3://${FRONTEND_BUCKET}/"'
      - 'echo "CloudFront Distribution: ${CLOUDFRONT_DISTRIBUTION_ID}"'
      - |
        if [ -z "${FRONTEND_BUCKET}" ] || [ -z "${CLOUDFRONT_DISTRIBUTION_ID}" ]; then
          echo "❌ ERROR: Required environment variables are missing."
          exit 1
        fi
      - echo "✅ Pre-build checks passed."

  build:
    commands:
      # ------------------------------------------------------------------
      # 1. 빌드 결과물을 프론트엔드 정적 버킷으로 동기화
      #    --delete   : S3에만 있고 로컬에 없는 파일 삭제 (구버전 정리)
      #    --exclude  : buildspec.yml 자체는 S3에 올리지 않음
      # ------------------------------------------------------------------
      - echo "📤 Syncing build artifacts to S3..."
      - |
        aws s3 sync . s3://${FRONTEND_BUCKET}/ \
          --delete \
          --exclude "buildspec.yml" \
          --exclude "*.zip" \
          --region ap-northeast-2
      - echo "✅ S3 sync complete."

      # ------------------------------------------------------------------
      # 2. CloudFront 캐시 무효화
      #    "/*" 로 전체 경로 무효화 (첫 1,000 경로/월 무료)
      # ------------------------------------------------------------------
      - echo "🔄 Invalidating CloudFront cache..."
      - |
        INVALIDATION_ID=$(aws cloudfront create-invalidation \
          --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} \
          --paths "/*" \
          --query 'Invalidation.Id' \
          --output text)
        echo "✅ CloudFront invalidation created: ${INVALIDATION_ID}"

  post_build:
    commands:
      - 'echo "========================================"'
      - 'echo " Deploy Complete: $(date -u ''+%Y-%m-%dT%H:%M:%SZ'')"'
      - 'echo "========================================"'
