# ==============================================================================
# Frontend CI/CD Workflow
# ==============================================================================
# [CI]  GitHub Actions: Lint → Test → Build → S3 아티팩트 업로드
# [CD]  AWS CodePipeline이 S3 변경을 감지 → CodeBuild가 배포 자동 실행
# ==============================================================================

name: Frontend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# OIDC 토큰 발급을 위해 필수
permissions:
  id-token: write
  contents: read

jobs:
  # ============================================================
  # CI Job: Lint + Test + Build (모든 push/PR에서 실행)
  # ============================================================
  ci:
    name: Lint / Test / Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20 (LTS)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # ⚠️ 경로에 맞게 수정하세요
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        continue-on-error: true # 린트(문법) 경고 때문에 배포가 멈추는 것을 방지
        # ESLint가 없으면 아래로 교체
        # run: npx eslint . --ext .ts,.tsx --max-warnings 0

      # - name: Test
      #   run: npm test -- --watchAll=false --passWithNoTests
      #   env:
      #     CI: true

      - name: Build
        run: npm run build
        env:
          # Create React App / Vite 공통 환경변수
          NODE_ENV: production

      # ============================================================
      # CD 준비: main 브랜치 push 시에만 S3로 아티팩트 업로드
      # ============================================================
      - name: Configure AWS credentials via OIDC
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # GitHub Repository Secrets에 등록 필요:
          #   AWS_GITHUB_ACTIONS_ROLE_ARN = Terraform output의 github_actions_role_arn
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}
          aws-region: ap-northeast-2
          # ------------------------------------------------------
          # [대안] OIDC 대신 IAM Access Key를 사용하려면 아래 주석 해제
          # aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # role-to-assume 줄은 삭제하세요.
          # ------------------------------------------------------

      - name: Package build artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p deploy_package
          
          # ⚠️ 주의: Vite(React)를 쓴다면 dist/, CRA(React)를 쓴다면 build/ 입니다.
          # 현재는 Vite 기준인 dist/ 로 설정해 두었습니다. (CRA면 cp -r build/. 로 변경)
          cp -r dist/. deploy_package/
          
          # Root 경로에 있는 buildspec.yml 파일을 복사
          cp buildspec.yml deploy_package/
          cd deploy_package
          zip -r ../deployment.zip .

      - name: Upload artifact to S3 (triggers CodePipeline)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # GitHub Secrets에 등록 필요:
          #   ARTIFACT_BUCKET = Terraform output의 pipeline_artifact_bucket_name
          aws s3 cp deployment.zip \
            s3://${{ secrets.ARTIFACT_BUCKET }}/frontend/deployment.zip \
            --region ap-northeast-2
          echo "✅ Artifact uploaded. CodePipeline will start automatically."

  # ============================================================
  # Build 결과 요약 (PR 코멘트용 — 선택사항)
  # ============================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: ci
    if: always()
    steps:
      - name: Report status
        run: |
          if [ "${{ needs.ci.result }}" = "success" ]; then
            echo "✅ CI passed. Deployment triggered (if push to main)."
          else
            echo "❌ CI failed. Deployment skipped."
            exit 1
          fi
